<!-- FORM -->
<h2>Place Your Orders</h2>
<form onsubmit="sendToWhatsApp(); return false;">

<div class="input-group">
<input type="text" id="name" placeholder="Name" required>
<input type="text" id="phone" placeholder="Phone Number" required>

<input class="full" type="text" id="location" placeholder="Location" required>

<select class="full" id="delivery">
<option>Pick-up</option>
<option>Delivery</option>
</select>
</div>

<div class="checkbox-group">
<label><input type="checkbox" value="Blocks"> Blocks</label>
<label><input type="checkbox" value="Electric Poles"> Electric Poles</label>
<label><input type="checkbox" value="Building Materials"> Building Materials</label>
<label><input type="checkbox" value="Paving Stones"> Paving Stones</label>
<label><input type="checkbox" value="Granite"> Granite</label>
<label><input type="checkbox" value="Kerbs"> Kerbs</label>
</div>

<button type="submit">Submit</button>

<!-- CALL BUTTON -->
<a class="btn" href="tel:08037420398">Call: 08037420398</a>

<!-- WHATSAPP BUTTON -->
<a class="btn" href="https://wa.me/2348037420398" target="_blank">
WhatsApp: +2348037420398
</a>

</form>

<script>
function sendToWhatsApp(){
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let location = document.getElementById("location").value;
    let delivery = document.getElementById("delivery").value;

    let services = document.querySelectorAll('input[type="checkbox"]:checked');
    let selected = [];
    services.forEach(s => selected.push(s.value));

    // Custom WhatsApp message
    let message = 
`Hello NATIONAL BLOCK INDUSTRY! 👋

I would like to place an order with the following details:

📝 Name: ${name}
📱 Phone: ${phone}
📍 Location: ${location}
🚚 Request Type: ${delivery}

🧱 Products to Order:
${selected.join(", ")}

Kindly provide the total cost, availability, and estimated delivery/pick-up time.
Thank you! 🙏`;

    let encodedMessage = encodeURIComponent(message);
    window.open(`https://wa.me/2348037420398?text=${encodedMessage}`, "_blank");
}
</script>
